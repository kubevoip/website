name: Pages
on:
  push:
    branches: [main]
  pull_request:
permissions:
  attestations: write
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.156.0"
          extended: true
      - run: npm ci
      - run: npm run build
      - name: Attest Pages artifact contents
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: public/**
      - uses: actions/upload-pages-artifact@v4
        if: github.event_name == 'push'
        with:
          path: public
  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
